{% extends "wallet/base.html" %}
{% block title %}Eliminar Usuario — Alke Wallet{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card p-4 border-danger">
            <h3 class="fw-bold text-danger mb-3">Eliminar Usuario</h3>
            <p>¿Estás segura de que quieres eliminar a <strong>{{ usuario }}</strong>?</p>
            <p class="text-muted small">Esta acción también eliminará todas las cuentas asociadas.</p>
            <form method="post">
                {% csrf_token %}
                <div class="d-flex gap-2 mt-3">
                    <button type="submit" class="btn btn-danger">Sí, eliminar</button>
                    <a href="{% url 'usuario_lista' %}" class="btn btn-outline-secondary">Cancelar</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
